<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- colubrid: three isometric snake segments climbing a step, chasing
       the amber food gem. Palette matches the game (scene.ts). -->
  <rect width="64" height="64" rx="14" fill="#0b0e14"/>
  <!-- body cube, bottom-left -->
  <g>
    <polygon points="18,30 27,35 18,40 9,35" fill="#4ade80"/>
    <polygon points="9,35 18,40 18,52 9,47" fill="#16a34a"/>
    <polygon points="27,35 18,40 18,52 27,47" fill="#15803d"/>
  </g>
  <!-- body cube, one iso step down-right -->
  <g>
    <polygon points="36,40 45,45 36,50 27,45" fill="#4ade80"/>
    <polygon points="27,45 36,50 36,62 27,57" fill="#16a34a"/>
    <polygon points="45,45 36,50 36,62 45,57" fill="#15803d"/>
  </g>
  <!-- head cube, stacked on top — lighter, like the game's head tint -->
  <g>
    <polygon points="36,16 45,21 36,26 27,21" fill="#bbf7d0"/>
    <polygon points="27,21 36,26 36,38 27,33" fill="#86efac"/>
    <polygon points="45,21 36,26 36,38 45,33" fill="#4ade80"/>
  </g>
  <!-- the food: an amber octahedron, two-tone for depth -->
  <g>
    <polygon points="53,4 59,12 53,20 47,12" fill="#f59e0b"/>
    <polygon points="53,4 59,12 53,20" fill="#b45309"/>
  </g>
</svg>
